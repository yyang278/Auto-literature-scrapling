name: Generate OBHRM Literature Report

on:
  workflow_dispatch:
    inputs:
      keyword_1:
        description: "Keyword/concept 1, for example: Organizational Behavior"
        required: true
        default: "AI"
        type: string
      keyword_2:
        description: "Keyword/concept 2. Leave blank if unused."
        required: false
        default: "LLM"
        type: string
      keyword_3:
        description: "Keyword/concept 3. Leave blank if unused."
        required: false
        default: "Large Language Model"
        type: string
      keyword_4:
        description: "Keyword/concept 4. Leave blank if unused."
        required: false
        default: ""
        type: string
      keyword_5:
        description: "Keyword/concept 5. Leave blank if unused."
        required: false
        default: ""
        type: string
      timezone:
        description: "Timezone used for the start/end window"
        required: true
        default: "Asia/Tokyo"
        type: choice
        options:
          - Asia/Tokyo
          - America/Chicago
          - Asia/Shanghai
      start_time:
        description: "Inclusive start in the selected timezone, for example: 2026-05-18T00:00"
        required: true
        type: string
      end_time:
        description: "Exclusive end in the selected timezone, for example: 2026-05-25T00:00"
        required: true
        type: string
      match_mode:
        description: "Keyword matching mode: any means OR; all means AND"
        required: true
        default: "any"
        type: choice
        options:
          - any
          - all
      journal_list:
        description: "Target source list"
        required: true
        default: "all-whitelist"
        type: choice
        options:
          - all-whitelist
          - abs-4-and-4-star
          - abs-4-star
          - ft50
          - utd24
      output_label:
        description: "Optional URL/output label. Leave blank to auto-generate."
        required: false
        type: string
      public_site_url:
        description: "Optional public site URL. Leave blank to use this repository's GitHub Pages URL."
        required: false
        default: ""
        type: string
      push_lark:
        description: "Send the short summary to Lark if webhook secrets are configured"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: obhrm-literature-report
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate, publish, and optionally push
        id: generate
        env:
          OBHRM_LARK_WEBHOOK_URL: ${{ secrets.OBHRM_LARK_WEBHOOK_URL }}
          OBHRM_LARK_WEBHOOK_SECRET: ${{ secrets.OBHRM_LARK_WEBHOOK_SECRET }}
          RUN_KEYWORD_1: ${{ inputs.keyword_1 }}
          RUN_KEYWORD_2: ${{ inputs.keyword_2 }}
          RUN_KEYWORD_3: ${{ inputs.keyword_3 }}
          RUN_KEYWORD_4: ${{ inputs.keyword_4 }}
          RUN_KEYWORD_5: ${{ inputs.keyword_5 }}
          RUN_START_TIME: ${{ inputs.start_time }}
          RUN_END_TIME: ${{ inputs.end_time }}
          RUN_TIMEZONE: ${{ inputs.timezone }}
          RUN_MATCH_MODE: ${{ inputs.match_mode }}
          RUN_JOURNAL_LIST: ${{ inputs.journal_list }}
          RUN_OUTPUT_LABEL: ${{ inputs.output_label }}
          RUN_PUBLIC_SITE_URL: ${{ inputs.public_site_url }}
        run: |
          if [ -n "$RUN_PUBLIC_SITE_URL" ]; then
            PUBLIC_SITE_URL="$RUN_PUBLIC_SITE_URL"
          else
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            PUBLIC_SITE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}"
          fi
          ARGS=(
            --start "$RUN_START_TIME"
            --end "$RUN_END_TIME"
            --timezone "$RUN_TIMEZONE"
            --match-mode "$RUN_MATCH_MODE"
            --journal-list "$RUN_JOURNAL_LIST"
            --strategy "openalex-source"
            --per-keyword "200"
            --max-pages "10"
            --public-site-url "$PUBLIC_SITE_URL"
          )
          for kw in "$RUN_KEYWORD_1" "$RUN_KEYWORD_2" "$RUN_KEYWORD_3" "$RUN_KEYWORD_4" "$RUN_KEYWORD_5"; do
            if [ -n "$kw" ]; then
              ARGS+=(--keyword "$kw")
            fi
          done
          if [ -n "$RUN_OUTPUT_LABEL" ]; then
            ARGS+=(--output-label "$RUN_OUTPUT_LABEL")
          fi
          python skills/obhrm-literature-monitor/scripts/run_github_report.py "${ARGS[@]}"

      - name: Upload generated report artifacts
        uses: actions/upload-artifact@v6
        with:
          name: obhrm-report-${{ steps.generate.outputs.report_dir }}
          path: |
            outputs/${{ steps.generate.outputs.report_dir }}/obhrm_daily_report.md
            outputs/${{ steps.generate.outputs.report_dir }}/obhrm_daily_report.html
            outputs/${{ steps.generate.outputs.report_dir }}/obhrm_daily_records.csv
            outputs/${{ steps.generate.outputs.report_dir }}/obhrm_scan_trace.csv
            logs/${{ steps.generate.outputs.report_dir }}/run.log

      - name: Commit published site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site
          if git diff --cached --quiet; then
            echo "No site changes to commit."
          else
            git commit -m "Publish literature report ${{ steps.generate.outputs.report_dir }}"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages site
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Push short Lark summary
        if: ${{ inputs.push_lark }}
        env:
          OBHRM_LARK_WEBHOOK_URL: ${{ secrets.OBHRM_LARK_WEBHOOK_URL }}
          OBHRM_LARK_WEBHOOK_SECRET: ${{ secrets.OBHRM_LARK_WEBHOOK_SECRET }}
          RUN_KEYWORD_1: ${{ inputs.keyword_1 }}
          RUN_KEYWORD_2: ${{ inputs.keyword_2 }}
          RUN_KEYWORD_3: ${{ inputs.keyword_3 }}
          RUN_KEYWORD_4: ${{ inputs.keyword_4 }}
          RUN_KEYWORD_5: ${{ inputs.keyword_5 }}
          RUN_START_TIME: ${{ inputs.start_time }}
          RUN_END_TIME: ${{ inputs.end_time }}
          RUN_TIMEZONE: ${{ inputs.timezone }}
        run: |
          if [ -z "$OBHRM_LARK_WEBHOOK_URL" ]; then
            echo "Lark push skipped: OBHRM_LARK_WEBHOOK_URL is not configured." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          CONCEPTS=""
          for kw in "$RUN_KEYWORD_1" "$RUN_KEYWORD_2" "$RUN_KEYWORD_3" "$RUN_KEYWORD_4" "$RUN_KEYWORD_5"; do
            if [ -n "$kw" ]; then
              if [ -n "$CONCEPTS" ]; then
                CONCEPTS="$CONCEPTS; $kw"
              else
                CONCEPTS="$kw"
              fi
            fi
          done
          python skills/obhrm-literature-monitor/scripts/push_lark_report_summary.py \
            --csv "outputs/${{ steps.generate.outputs.report_dir }}/obhrm_daily_records.csv" \
            --start "$RUN_START_TIME" \
            --end "$RUN_END_TIME" \
            --timezone "$RUN_TIMEZONE" \
            --concepts "$CONCEPTS" \
            --public-report-url "${{ steps.generate.outputs.public_report_url }}" \
            --public-index-url "${{ steps.generate.outputs.public_index_url }}"
          echo "Lark summary sent." >> "$GITHUB_STEP_SUMMARY"
