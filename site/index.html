<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OBHRM Literature Reports</title>
  <style>
:root {
  color-scheme: light;
  --ink: #172033;
  --muted: #647084;
  --line: #d9e0ea;
  --panel: #ffffff;
  --accent: #1f5fbf;
  --accent-strong: #123b77;
  --soft: #f7f9fc;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans",
    "Microsoft YaHei", Arial, sans-serif;
  color: var(--ink);
  background: linear-gradient(180deg, #f4f7fb 0%, #eef3f8 280px, #f7f9fc 100%);
  line-height: 1.55;
}
main {
  width: min(980px, calc(100% - 40px));
  margin: 42px auto 60px;
}
.hero {
  background: #ffffff;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 30px 34px;
  box-shadow: 0 18px 44px rgba(24, 33, 47, 0.10);
}
h1 {
  margin: 0 0 10px;
  color: var(--accent-strong);
  font-size: 34px;
  line-height: 1.16;
}
.subtitle {
  margin: 0;
  color: var(--muted);
  max-width: 70ch;
}
.report-list {
  display: grid;
  gap: 14px;
  margin-top: 24px;
}
.report-card {
  display: block;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 18px 20px;
  text-decoration: none;
  color: inherit;
  box-shadow: 0 8px 22px rgba(24, 33, 47, 0.06);
}
.report-card:hover {
  border-color: #b7cdfb;
  transform: translateY(-1px);
}
.report-title {
  display: block;
  color: var(--accent);
  font-size: 19px;
  font-weight: 800;
}
.report-meta {
  display: block;
  color: var(--muted);
  margin-top: 5px;
  overflow-wrap: anywhere;
}
.empty {
  margin-top: 24px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 18px 20px;
  color: var(--muted);
}
@media (max-width: 720px) {
  main { width: min(100% - 20px, 980px); margin-top: 18px; }
  .hero { padding: 22px 20px; }
  h1 { font-size: 27px; }
}
</style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>OBHRM Literature Reports</h1>
      <p class="subtitle">Weekly literature reports generated from the OBHRM/HCI/preprint target-source monitor. Generated index: 2026-05-29T14:19:06</p>
    </section>
    <section class="report-list">
      <a class="report-card" href="reports/2026-05-25_ai-llm-week-2026-05-18-to-2026-05-24-designed-198/"><span class="report-title">OBHRM Weekly Literature Report</span><span class="report-meta">2026-05-18T00:00:00+09:00 to 2026-05-25T00:00:00+09:00</span></a>
    </section>
  </main>
</body>
</html>
